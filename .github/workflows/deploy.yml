name: Deploy backend to server

# main에 push되면 서버로 SSH 접속해 git pull + docker compose 재기동(서버에서 빌드).
# 프론트(web/frontend)는 Vercel Git 연동이 별도로 자동 배포하므로 여기서 다루지 않는다.
on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "web/backend/**"
      - "collector/**"
      - "trader/**"
      - "shared/**"
      - "docker-compose.yml"
      - "**/Dockerfile"
      - "**/requirements.txt"
  workflow_dispatch: {}   # 수동 실행 버튼

concurrency:
  group: deploy-server
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH 배포 (git pull + compose up --build)
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          REMOTE_DIR: ${{ secrets.REMOTE_DIR }}
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          DIR="${REMOTE_DIR:-~/quant-miner}"
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_deploy -p "$PORT" "$SSH_USER@$SSH_HOST" "
            set -e
            cd $DIR
            git pull --ff-only
            docker compose up -d --build
            docker compose ps
          "
