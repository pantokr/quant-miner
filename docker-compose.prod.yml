# 원격 서버용 — 빌드 없이 load된 이미지로 기동.
# (docker load -i quant-images.tar 후 docker compose -f docker-compose.prod.yml up -d)
services:
  db:
    image: postgres:17-alpine
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U panto -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # KIS 게이트웨이 — 내부 전용(외부 포트 미공개)
  api:
    image: quant-miner-api:latest
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # 웹 백엔드 — 외부 공개(프론트/Vercel이 호출)
  backend:
    image: quant-miner-backend:latest
    ports:
      - "8000:8000"
    environment:
      - KIS_GATEWAY_URL=http://api:9000
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

  collector:
    image: quant-miner-collector:latest
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  trader:
    image: quant-miner-trader:latest
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
