services:
  db:
    image: timescale/timescaledb:latest-pg17
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb"]
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U panto -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # KIS 게이트웨이 — KIS OpenAPI 호출 전담
  api:
    image: quant-miner-api:latest
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "9000:9000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # 웹 백엔드 — 프론트 서빙(DB 조회 + api 중계). 프론트는 여기만 호출.
  backend:
    image: quant-miner-backend:latest
    build:
      context: .
      dockerfile: web/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - KIS_GATEWAY_URL=http://api:9000
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

  collector:
    image: quant-miner-collector:latest
    build:
      context: .
      dockerfile: collector/Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  trader:
    image: quant-miner-trader:latest
    build:
      context: .
      dockerfile: trader/Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

# frontend는 Vercel이 담당하므로 compose에서 제외

volumes:
  pgdata:
